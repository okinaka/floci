name: Edge

# Builds and publishes the JVM image from the tip of main as the `edge` Docker tag.
# Runs on a weekly schedule (every Monday 00:00 UTC) and can be triggered manually.
# Uses JVM-only build to keep runtime cost low (~2-3 min vs ~15 min for native).
#
# Published tag: floci/floci:edge
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at 00:00 UTC
  workflow_dispatch:        # Allow maintainers to trigger manually

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-edge:
    name: Build and push edge image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build JVM artifact
        run: mvn clean package -DskipTests -q

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push edge image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.jvm-package
          platforms: linux/amd64,linux/arm64
          push: true
          tags: floci/floci:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_AWS_CLI=true
