services:
  floci:
    build:
      context: .
      dockerfile: Dockerfile.native
    ports:
      - "4566:4566"
      - "6379-6399:6379-6399"
      - "7001-7099:7001-7099"
      - "9200-9299:9200-9299"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/etc/floci/init/start.d
      - ./scripts:/etc/floci/init/stop.d
      - ./data:/app/data
    environment:
      FLOCI_SERVICES_DOCKER_NETWORK: floci_default
      FLOCI_SERVICES_RDS_PROXY_BASE_PORT: "7001"
      FLOCI_STORAGE_HOST_PERSISTENT_PATH: ${PWD}/data
      FLOCI_HOSTNAME: floci
      FLOCI_BASE_URL: http://floci:4566
      FLOCI_SERVICES_LAMBDA_HOT_RELOAD_ENABLED: "true"
    networks:
      floci_default:
        aliases:
          - localhost.floci.io

networks:
  floci_default:
    name: floci_default
